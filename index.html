<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acervo Maria da Conceição</title>
    <script>
      // Aplica o tema salvo antes da renderização (evita flash de tela clara)
      (function () {
        try {
          var t = localStorage.getItem('acervo_theme');
          if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
